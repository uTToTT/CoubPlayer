<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Coub Player</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <video id="bgVideo" autoplay muted loop></video>
    <video id="playerA" muted loop></video>
    <video id="playerB" muted loop></video>

    <audio id="audio"></audio>

    <button id="prev" class="button">◀</button>
    <button id="next" class="button">▶</button>
    <button id="restart" class="button">↺</button>
    <button id="fullscreen" class="fullscreen-btn" type="button">⛶</button>
    <div id="videoIndexWrapper">
      <input id="videoIndexInput" type="number" min="1" />
      <span id="videoTotal"></span>
    </div>

    <select id="playlistSelect">
      <option value="__new__">+ Create new playlist</option>
    </select>

    <div class="sort-bar">
      <div class="sort-group" id="sortTypeGroup">
        <button data-type="order" class="active">Order</button>
        <button data-type="lastViewed">Last viewed</button>
        <button data-type="random">Random</button>
      </div>

      <button id="sortDirectionBtn" title="Toggle direction">↑</button>

      <input id="seedInput" type="number" placeholder="Seed" class="hidden" />
    </div>

    <div style="position: absolute; top: 100px; left: 10px; z-index: 10">
      <button id="editPlaylistsBtn" type="button">
        Добавить / Удалить из плейлиста
      </button>
      <div id="playlistCheckboxesContainer">
        <div id="playlistCheckboxes"></div>
        <button id="savePlaylistsBtn" type="button">Сохранить</button>
      </div>
    </div>

    <div id="videoInfo" class="video-info">
      <div>Index: <span id="videoIndexLabel">-</span></div>
      <div>Title: <span id="videoTitleLabel">-</span></div>
      <div>ID: <span id="videoIdLabel">-</span></div>
      <button id="copyLinkBtn">Copy link</button>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
