<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Coub Player</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .top-controls-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .download-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(120, 200, 255, 0.35);
        background: rgba(20, 30, 40, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #d8f0ff;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.2px;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          transform 0.15s ease;
      }

      .download-btn:hover {
        background: rgba(60, 140, 200, 0.35);
        border-color: rgba(140, 210, 255, 0.7);
        transform: translateY(-1px);
      }

      .download-btn:active {
        transform: translateY(0);
      }

      .download-btn:disabled {
        opacity: 0.5;
        cursor: default;
        transform: none;
      }

      .download-btn-icon {
        font-size: 15px;
        line-height: 1;
      }

      .download-btn-label {
        line-height: 1;
      }

      @media (max-width: 640px) {
        .download-btn-label {
          display: none;
        }
        .download-btn {
          padding: 8px;
          border-radius: 50%;
        }
      }

      .rt-clock {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        padding: 6px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(10, 14, 20, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #e8f4ff;
        font-variant-numeric: tabular-nums;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>

  <body tabindex="-1">
    <!-- Часы реального времени -->
    <div id="realTimeClock" class="rt-clock">--:--:--</div>

    <!-- Фоновое видео -->
    <video id="bgVideo" autoplay muted loop></video>

    <!-- Видео буферы -->
    <div class="video-wrapper">
      <video id="playerA" autoplay muted loop></video>
      <video id="playerB" autoplay muted loop></video>
    </div>

    <audio id="audio" loop></audio>

    <!-- Боковые кнопки навигации -->
    <button id="prev" class="button">⯇</button>
    <button id="next" class="button">⯈</button>

    <!-- Кнопка полноэкранного режима -->
    <button id="fullscreen" class="fullscreen-btn" type="button">⛶</button>

    <!-- Счётчик видео -->
    <div id="videoIndexWrapper" class="panel">
      <input id="videoIndexInput" type="number" min="1" />
      <span id="videoTotal"></span>
    </div>

    <div id="pauseOverlay" class="pause-overlay">
      <div class="pause-icon"><span></span><span></span></div>
    </div>

    <!-- Нижняя панель управления -->
    <div class="bottom-controls panel">
      <input
        id="volumeSlider"
        type="range"
        min="0"
        max="100"
        value="50"
        class="volume-slider"
      />
      <button id="copyLinkBtn" class="control-btn" title="Копировать ссылку">
        🔗
      </button>
      <button id="restart" class="control-btn" title="Перезапустить">↺</button>

      <button id="editTagsBtn" class="control-btn" title="Теги видео">
        🏷
      </button>

      <button
        id="editPlaylistsBtn"
        class="control-btn control-btn--accent"
        title="Добавить в плейлист"
      >
        ✎
      </button>
    </div>

    <!-- VIDEO TAGS panel -->
    <div id="videoTagsOverlay" class="pl-editor-overlay">
      <div id="videoTagsPanel" class="pl-editor-panel video-tags-panel">
        <div class="pl-editor-header">
          <div class="pl-editor-header-text">
            <div class="pl-editor-title">Теги видео</div>
            <div class="pl-editor-subtitle" id="videoTagsSubtitle">—</div>
          </div>
          <button class="pl-editor-close" id="videoTagsClose">✕</button>
        </div>
        <div class="video-tags-chips" id="videoTagsChips"></div>
        <div class="video-tags-recent" id="videoTagsRecent"></div>
        <div class="video-tags-add">
          <input
            id="videoTagsInput"
            type="text"
            placeholder="Добавить тег…"
            list="allTagsDatalist"
            autocomplete="off"
            maxlength="40"
          />
          <button id="videoTagsAddBtn">＋</button>
        </div>
        <datalist id="allTagsDatalist"></datalist>
      </div>
    </div>

    <!-- Верхняя панель (плейлист + загрузка по ссылке + сортировка) -->
    <div class="top-controls panel">
      <div class="top-controls-left">
        <button class="pl-trigger-btn" id="playlistTriggerBtn">
          <span class="pl-trigger-icon">◈</span>
          <span class="pl-trigger-label" id="playlistTriggerLabel"
            >Playlist</span
          >
          <svg class="pl-trigger-chevron" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 4l4 4 4-4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <!-- Группа загрузки видео: по ссылке / liked / bookmarks -->
        <div class="dl-dropdown" id="dlDropdown">
          <button
            id="dlDropdownBtn"
            class="download-btn dl-dropdown-trigger"
            type="button"
            title="Добавить видео"
          >
            <span class="download-btn-icon">⬇</span>
            <span class="download-btn-label">Загрузить</span>
            <svg class="dl-dropdown-chevron" viewBox="0 0 12 12" fill="none">
              <path
                d="M2 4l4 4 4-4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <div class="dl-dropdown-menu hidden" id="dlDropdownMenu">
            <button
              id="downloadCoubsBtn"
              class="dl-dropdown-item"
              title="Добавить видео по ссылке"
            >
              <span class="dl-dropdown-item-icon">⬇</span>
              По ссылке
            </button>
            <button
              id="syncLikedBtn"
              class="dl-dropdown-item"
              title="Догрузить новые лайкнутые ролики с coub.com"
            >
              <span class="dl-dropdown-item-icon">🔄</span>
              Liked
            </button>
            <button
              id="syncBookmarksBtn"
              class="dl-dropdown-item"
              title="Догрузить новые закладки с coub.com"
            >
              <span class="dl-dropdown-item-icon">🔄</span>
              Bookmarks
            </button>
          </div>
        </div>
      </div>

      <div class="sort-bar">
        <div class="sort-group" id="sortTypeGroup">
          <button data-type="order" class="active">Order</button>
          <button data-type="random">Random</button>
        </div>
        <button id="sortDirectionBtn" title="Направление сортировки">↑</button>
        <input
          id="seedInput"
          type="number"
          value="42"
          min="1"
          class="hidden"
          title="Seed"
        />
      </div>
    </div>

    <!-- Таймлайн / перемотка -->
    <div id="seekBarWrapper" class="seek-bar-wrapper panel">
      <span id="seekBarCurrent" class="seek-bar-time">0:00</span>
      <div id="seekBarTrack" class="seek-bar-track">
        <div id="seekBarFill" class="seek-bar-fill"></div>
        <div id="seekBarThumb" class="seek-bar-thumb"></div>
      </div>
      <span id="seekBarDuration" class="seek-bar-time">0:00</span>
    </div>

    <!-- SORTING panel: плейлисты + теги в одном окне -->
    <div id="sortingOverlay" class="pl-editor-overlay pl-editor-overlay--modal">
      <div id="sortingPanel" class="pl-editor-panel pl-fullscreen-panel">
        <div class="pl-editor-header">
          <div class="pl-editor-header-text">
            <div class="pl-editor-title" id="sortingTitle">Плейлисты</div>
            <div class="pl-editor-subtitle" id="sortingSubtitle">
              Выберите плейлист
            </div>
          </div>
          <div class="tag-filter-mode" id="tagFilterModeGroup" hidden>
            <button data-mode="any" class="active">Любой из</button>
            <button data-mode="all">Все сразу</button>
          </div>
          <button class="pl-editor-close" id="sortingClose">✕</button>
        </div>

        <div class="pl-tabs" id="sortingTabs">
          <button data-tab="playlists" class="active">
            <span class="pl-tab-icon">◈</span> Плейлисты
          </button>
          <button data-tab="tags">
            <span class="pl-tab-icon">🏷</span> Теги
          </button>
        </div>

        <div class="pl-editor-search">
          <svg class="pl-search-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="9"
              cy="9"
              r="6"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M13.5 13.5 17 17"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
          <input
            id="sortingSearch"
            class="pl-search-input"
            type="text"
            placeholder="Найти плейлист…"
            autocomplete="off"
          />
          <button class="pl-search-clear hidden" id="sortingSearchClear">
            ✕
          </button>
        </div>

        <div class="pl-editor-list pl-selector-grid" id="plSelectorList"></div>
        <div
          class="pl-editor-list pl-selector-grid pl-tab-hidden"
          id="tagFilterList"
        ></div>

        <div class="pl-editor-footer" id="sortingFooterPlaylists">
          <button class="pl-new-btn" id="plSelectorNewBtn">
            <span class="pl-new-icon">＋</span> Создать плейлист
          </button>
        </div>
        <div class="pl-editor-footer pl-tab-hidden" id="sortingFooterTags">
          <button class="pl-new-btn" id="tagFilterClearBtn">
            ✕ Сбросить фильтр
          </button>
        </div>
      </div>
    </div>

    <!-- Название текущего видео -->
    <div id="videoInfo" class="video-info panel">
      <span id="videoTitleLabel">—</span>
    </div>

    <!-- ═══════════════════════════════════════════
         PLAYLIST EDITOR — Pinterest-style side panel
         ═══════════════════════════════════════════ -->
    <div id="playlistEditorOverlay" class="pl-editor-overlay">
      <div id="playlistEditorPanel" class="pl-editor-panel">
        <!-- Шапка -->
        <div class="pl-editor-header">
          <div class="pl-editor-header-text">
            <div class="pl-editor-title">Сохранить в плейлист</div>
            <div class="pl-editor-subtitle" id="plEditorSubtitle">—</div>
          </div>
          <button class="pl-editor-close" id="plEditorClose" title="Закрыть">
            ✕
          </button>
        </div>

        <!-- Поиск -->
        <div class="pl-editor-search">
          <svg class="pl-search-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="9"
              cy="9"
              r="6"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M13.5 13.5 17 17"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
          <input
            id="plSearchInput"
            class="pl-search-input"
            type="text"
            placeholder="Найти плейлист…"
            autocomplete="off"
          />
          <button class="pl-search-clear hidden" id="plSearchClear">✕</button>
        </div>

        <!-- Список плейлистов -->
        <div class="pl-editor-list" id="plEditorList">
          <!-- Строки рендерятся через JS -->
        </div>

        <!-- Футер: кнопка нового плейлиста -->
        <div class="pl-editor-footer">
          <button class="pl-new-btn" id="plNewBtn">
            <span class="pl-new-icon">＋</span>
            Создать новый плейлист
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>

    <!-- Тоггл выпадающего списка кнопок загрузки (чисто UI, не трогает логику main.js) -->
    <script>
      (function () {
        var wrap = document.getElementById("dlDropdown");
        var btn = document.getElementById("dlDropdownBtn");
        var menu = document.getElementById("dlDropdownMenu");
        if (!wrap || !btn || !menu) return;

        function closeMenu() {
          menu.classList.add("hidden");
          wrap.classList.remove("open");
        }
        function toggleMenu(e) {
          e.stopPropagation();
          var willOpen = menu.classList.contains("hidden");
          closeMenu();
          if (willOpen) {
            menu.classList.remove("hidden");
            wrap.classList.add("open");
          }
        }

        btn.addEventListener("click", toggleMenu);

        // Закрывать список после выбора любого из пунктов
        menu.querySelectorAll(".dl-dropdown-item").forEach(function (item) {
          item.addEventListener("click", closeMenu);
        });

        // Закрывать по клику вне и по Escape
        document.addEventListener("click", function (e) {
          if (!wrap.contains(e.target)) closeMenu();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeMenu();
        });
      })();
    </script>
  </body>
</html>
