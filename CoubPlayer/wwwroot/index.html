<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Coub Player</title>
    <link rel="stylesheet" href="css/style.css" />

    <!--
      Стиль кнопки "Добавить по ссылке" вынесен сюда отдельным блоком,
      чтобы не трогать существующий style.css. При желании можно перенести
      эти правила туда же — они самодостаточны и ни на что не завязаны,
      кроме структуры .top-controls-left / .download-btn ниже.
    -->
    <style>
      .top-controls-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .download-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(120, 200, 255, 0.35);
        background: rgba(20, 30, 40, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #d8f0ff;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.2px;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          transform 0.15s ease;
      }

      .download-btn:hover {
        background: rgba(60, 140, 200, 0.35);
        border-color: rgba(140, 210, 255, 0.7);
        transform: translateY(-1px);
      }

      .download-btn:active {
        transform: translateY(0);
      }

      .download-btn:disabled {
        opacity: 0.5;
        cursor: default;
        transform: none;
      }

      .download-btn-icon {
        font-size: 15px;
        line-height: 1;
      }

      .download-btn-label {
        line-height: 1;
      }

      @media (max-width: 640px) {
        .download-btn-label {
          display: none;
        }
        .download-btn {
          padding: 8px;
          border-radius: 50%;
        }
      }
    </style>
  </head>

  <body tabindex="-1">
    <!-- Фоновое видео -->
    <video id="bgVideo" autoplay muted loop></video>

    <!-- Видео буферы -->
    <div class="video-wrapper">
      <video id="playerA" autoplay muted loop></video>
      <video id="playerB" autoplay muted loop></video>
    </div>

    <audio id="audio" loop></audio>

    <!-- Боковые кнопки навигации -->
    <button id="prev" class="button">⯇</button>
    <button id="next" class="button">⯈</button>

    <!-- Кнопка полноэкранного режима -->
    <button id="fullscreen" class="fullscreen-btn" type="button">⛶</button>

    <!-- Счётчик видео -->
    <div id="videoIndexWrapper" class="panel">
      <input id="videoIndexInput" type="number" min="1" />
      <span id="videoTotal"></span>
    </div>

    <div id="pauseOverlay" class="pause-overlay">
      <div class="pause-icon"><span></span><span></span></div>
    </div>

    <!-- Нижняя панель управления -->
    <div class="bottom-controls panel">
      <input
        id="volumeSlider"
        type="range"
        min="0"
        max="100"
        value="50"
        class="volume-slider"
      />
      <button id="copyLinkBtn" class="control-btn" title="Копировать ссылку">
        🔗
      </button>
      <button id="restart" class="control-btn" title="Перезапустить">↺</button>
      <button
        id="editPlaylistsBtn"
        class="control-btn control-btn--accent"
        title="Добавить в плейлист"
      >
        ✎
      </button>
    </div>

    <!-- Верхняя панель (плейлист + загрузка по ссылке + сортировка) -->
    <div class="top-controls panel">
      <div class="top-controls-left">
        <button class="pl-trigger-btn" id="playlistTriggerBtn">
          <span class="pl-trigger-icon">◈</span>
          <span class="pl-trigger-label" id="playlistTriggerLabel"
            >Playlist</span
          >
          <svg class="pl-trigger-chevron" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 4l4 4 4-4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <!-- Кнопка загрузки видео по ссылке -->
        <button
          id="downloadCoubsBtn"
          class="download-btn"
          title="Добавить видео по ссылке"
        >
          <span class="download-btn-icon">⬇</span>
          <span class="download-btn-label">По ссылке</span>
        </button>
      </div>

      <div class="sort-bar">
        <div class="sort-group" id="sortTypeGroup">
          <button data-type="order" class="active">Order</button>
          <button data-type="random">Random</button>
        </div>
        <button id="sortDirectionBtn" title="Направление сортировки">↑</button>
        <input
          id="seedInput"
          type="number"
          value="42"
          min="1"
          class="hidden"
          title="Seed"
        />
      </div>
    </div>

    <!-- PLAYLIST SELECTOR panel -->
    <div id="playlistSelectorOverlay" class="pl-editor-overlay">
      <div id="playlistSelectorPanel" class="pl-editor-panel pl-selector-panel">
        <div class="pl-editor-header">
          <div class="pl-editor-header-text">
            <div class="pl-editor-title">Плейлисты</div>
            <div class="pl-editor-subtitle">Выберите плейлист</div>
          </div>
          <button class="pl-editor-close" id="plSelectorClose">✕</button>
        </div>
        <div class="pl-editor-search">
          <svg class="pl-search-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="9"
              cy="9"
              r="6"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M13.5 13.5 17 17"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
          <input
            id="plSelectorSearch"
            class="pl-search-input"
            type="text"
            placeholder="Найти плейлист…"
            autocomplete="off"
          />
          <button class="pl-search-clear hidden" id="plSelectorClear">✕</button>
        </div>
        <div class="pl-editor-list" id="plSelectorList"></div>
        <div class="pl-editor-footer">
          <button class="pl-new-btn" id="plSelectorNewBtn">
            <span class="pl-new-icon">＋</span> Создать плейлист
          </button>
        </div>
      </div>
    </div>

    <!-- Название текущего видео -->
    <div id="videoInfo" class="video-info panel">
      <span id="videoTitleLabel">—</span>
    </div>

    <!-- ═══════════════════════════════════════════
         PLAYLIST EDITOR — Pinterest-style side panel
         ═══════════════════════════════════════════ -->
    <div id="playlistEditorOverlay" class="pl-editor-overlay">
      <div id="playlistEditorPanel" class="pl-editor-panel">
        <!-- Шапка -->
        <div class="pl-editor-header">
          <div class="pl-editor-header-text">
            <div class="pl-editor-title">Сохранить в плейлист</div>
            <div class="pl-editor-subtitle" id="plEditorSubtitle">—</div>
          </div>
          <button class="pl-editor-close" id="plEditorClose" title="Закрыть">
            ✕
          </button>
        </div>

        <!-- Поиск -->
        <div class="pl-editor-search">
          <svg class="pl-search-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="9"
              cy="9"
              r="6"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M13.5 13.5 17 17"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
          <input
            id="plSearchInput"
            class="pl-search-input"
            type="text"
            placeholder="Найти плейлист…"
            autocomplete="off"
          />
          <button class="pl-search-clear hidden" id="plSearchClear">✕</button>
        </div>

        <!-- Список плейлистов -->
        <div class="pl-editor-list" id="plEditorList">
          <!-- Строки рендерятся через JS -->
        </div>

        <!-- Футер: кнопка нового плейлиста -->
        <div class="pl-editor-footer">
          <button class="pl-new-btn" id="plNewBtn">
            <span class="pl-new-icon">＋</span>
            Создать новый плейлист
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
