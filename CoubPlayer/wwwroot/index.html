<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Coub Player</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <video id="bgVideo" autoplay muted loop></video>
    <video id="playerA" muted loop></video>
    <video id="playerB" muted loop></video>

    <audio id="audio"></audio>

    <button id="prev" class="button">◀</button>
    <button id="next" class="button">▶</button>
    <button id="restart" class="button">↺</button>
    <button id="fullscreen" class="fullscreen-btn" type="button">⛶</button>
    <div id="videoTitle"></div>
    <input id="seedInput" type="number" placeholder="Seed" />
    <input id="videoIndexInput" type="number" placeholder="Video #" />
    <button id="goToVideoBtn">Go</button>

    <select id="playlistSelect">
      <option value="">Choose playlist</option>
    </select>

    <div style="position: absolute; top: 50px; left: 10px; z-index: 10">
      <input type="text" id="newPlaylistName" placeholder="New playlist" />
      <button id="createPlaylistBtn" type="button">Create</button>
    </div>

    <div style="position: absolute; top: 10px; left: 200px; z-index: 10">
      <label>
        Сортировка:
        <select id="sortTypeSelect">
          <option value="order">По порядку</option>
          <option value="lastViewed">По дате просмотра</option>
          <option value="random">Случайный</option>
        </select>
      </label>
      <button id="sortAscBtn">↑</button>
      <button id="sortDescBtn">↓</button>
    </div>

    <div style="position: absolute; top: 100px; left: 10px; z-index: 10">
      <button id="editPlaylistsBtn" type="button">
        Добавить / Удалить из плейлиста
      </button>
      <div
        id="playlistCheckboxesContainer"
        style="
          display: none;
          margin-top: 5px;
          background: rgba(0, 0, 0, 0.7);
          color: rgba(255, 255, 255, 0.7);
          padding: 10px;
          border-radius: 5px;
        "
      >
        <div id="playlistCheckboxes"></div>
        <button id="savePlaylistsBtn" type="button" style="margin-top: 5px">
          Сохранить
        </button>

        <button id="cancelPlaylistsBtn" type="button" style="margin-top: 5px">
          Отмена
        </button>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
